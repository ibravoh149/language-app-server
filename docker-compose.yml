services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      LLM_SERVICE_URL: http://llm:8000
    env_file:
      - .env
    depends_on:
      - llm
    networks:
      - languageapp-net

  llm:
    build:
      context: ./apps/llm
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - languageapp-net
    # In dev, Ollama runs natively on your machine.
    # The container reaches it via host.docker.internal:11434 (set in .env).
    # No Ollama container needed here.

networks:
  languageapp-net:
    driver: bridge
