services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      LLM_SERVICE_URL: http://llm:8000
      AUDIO_SERVICE_URL: http://audio:8001
    env_file:
      - .env
    depends_on:
      - llm
      - audio
    networks:
      - languageapp-net

  llm:
    build:
      context: ./apps/llm
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - languageapp-net
    # In dev, Ollama runs natively on your machine.
    # The container reaches it via host.docker.internal:11434 (set in .env).

  audio:
    build:
      context: ./apps/audio
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file:
      - .env
    volumes:
      - audio_model_cache:/root/.cache  # persists Whisper + Kokoro model downloads
    networks:
      - languageapp-net

networks:
  languageapp-net:
    driver: bridge

volumes:
  audio_model_cache:
