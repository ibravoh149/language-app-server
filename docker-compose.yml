services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      LLM_SERVICE_URL: http://llm:8000
      AUDIO_SERVICE_URL: http://audio:8001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      llm:
        condition: service_started
      audio:
        condition: service_started
    networks:
      - languageapp-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-languageapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-languageapp}
      POSTGRES_DB: ${POSTGRES_DB:-languageapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - languageapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-languageapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  llm:
    build:
      context: ./apps/llm
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - languageapp-net
    # In dev, Ollama runs natively on your machine.
    # The container reaches it via host.docker.internal:11434 (set in .env).

  audio:
    build:
      context: ./apps/audio
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file:
      - .env
    volumes:
      - audio_model_cache:/root/.cache  # persists Whisper + Kokoro model downloads
    networks:
      - languageapp-net

networks:
  languageapp-net:
    driver: bridge

volumes:
  audio_model_cache:
  postgres_data:
