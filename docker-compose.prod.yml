services:
  api:
    restart: always
    environment:
      NODE_ENV: production

  llm:
    restart: always
    depends_on:
      ollama:
        condition: service_healthy   # waits until Ollama is ready before starting
    # In prod, set TASK_ROUTING in .env to route tasks to "deepseek" or "ollama"

